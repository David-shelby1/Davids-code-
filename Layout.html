<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        nav {
            background-color: blue;
            text-align: center;
        }

        .david {
            display: flex;
            justify-content: space-around;
            height: 75vh;
            width: 100%;
            text-align: center;
            border: 1px;
        }

        main {
            background-color: aqua;
            width: 25%;
            border: 1px;
            padding: 10px;
            margin: 10px;
        }
        aside{
             background-color: aqua;
            width: 25%;
            border: 1px;
            padding: 10px;
            margin: 10px;
            }
            section{
                 background-color: aqua;
            width: 25%;
            border: 1px;
            padding: 10px;
            margin: 10px;
        }
            article {background-color: aqua;
            width: 25%;
            border: 1px;
            padding: 10px;
            margin: 10px;
        }
        footer{
            text-align: center;
            background-color: brown;
        }
    </style>
</head>

<body>
    <nav>
        <h1>Nav</h1>
    </nav>
    <div class="david">
        <main>
            <h1>Main</h1>
        </main>
        <aside>
            <h1>Aside</h1>
        </aside>
        <section>
            <h1>Section</h1>
        </section>
        <article>
            <h1>Article</h1>
        </article>
    </div>
    <footer>
        <h1>Footer</h1>
    </footer>
</body>

</html>
