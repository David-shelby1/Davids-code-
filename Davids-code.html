<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelby</title>
    <style>
        * {
            font-family: Cambria, Cochin, Georgia, Times, 
            'Times New Roman', serif;
        }

        body {
            background-color: whitesmoke;
            width: 100%;
            height: 50vh;
            display: flex;
            flex-direction: column;
            
        }
    </style>
</head>

<body>
    <div class="sign-up-form">
        <h1>
            Sign Up Form
        </h1>
        <form action="" method="post">
            <label>First Name:</label> <input type="text" required placeholder="Enter first name">
            <br><br>
            <label>Last Name:</label> <input type="text" required placeholder="Enter Last name">
            <br><br>
            <label>Password:</label> <input type="password" required placeholder="Enter Password">
            <br><br>
            <label>Confirm Password:</label> <input type="comfirm password" required
                placeholder="Enter Confirm Password">
            <br><br>
            <label>Email:</label> <input type="email" required placeholder="Enter Email">
            <br><br>
            <label for="gender" value="male">Male</label>
            <input type="radio">
            <label for="gender" value="female">Female</label>
            <input type="radio">
            <br><br>
            <input type="submit">
        </form>
    </div>
</body>

</html>
